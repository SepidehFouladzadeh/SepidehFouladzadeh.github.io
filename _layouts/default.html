<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="ZvUXLFPq3iU-D207yVmmnYVKNSJ2zryPyA_jQxLYWrQ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} | {% endif %}Sepideh Fouladzadeh</title>

  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="author" content="Sepideh Fouladzadeh">

  <!-- <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"> -->
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #a9c9b8;
      color: #1f2f29;
      line-height: 1.6;
    }

    nav {
      position: fixed;
      top: 20px;
      right: 40px;
      z-index: 10;
    }

    nav a,
    nav a:visited {
      margin-left: 20px;
      text-decoration: none;
      color: #1f2f29;
      font-size: 0.95rem;
    }

    nav a:hover {
      opacity: 0.6;
    }

    .section-label {
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.78rem;
      opacity: 0.65;
      margin-bottom: 1rem;
    }

    .essay-page {
      width: min(760px, calc(100% - 4rem));
      margin: 0 auto;
      padding: 8rem 0 5rem;
    }

    .back-link,
    .back-link:visited {
      display: inline-block;
      margin-bottom: 4rem;
      color: #1f2f29;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.7;
    }

    .back-link:hover {
      opacity: 0.5;
    }

    .essay-header {
      margin-bottom: 4rem;
    }

    .essay-header h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 500;
      line-height: 1.1;
    }

    .essay-description {
      max-width: 680px;
      margin: 0 0 1.5rem;
      color: #40564c;
      font-size: 1.2rem;
    }

    .essay-meta {
      margin: 0;
      color: #40564c;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .essay-content {
      font-size: 1.1rem;
      line-height: 1.85;
    }

    .essay-content p {
      margin: 0 0 1.65rem;
    }

    .essay-footer {
      margin-top: 5rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(31, 47, 41, 0.18);
    }

    .essay-footer h2 {
      margin: 0 0 1.5rem;
      font-size: 1.35rem;
      font-weight: 500;
    }

    .essay-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .essay-actions a,
    .essay-actions a:visited {
      color: #1f2f29;
      text-decoration: none;
    }

    .essay-actions a:hover {
      opacity: 0.6;
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #40564c;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      nav {
        position: static;
        text-align: center;
        padding-top: 1.5rem;
      }

      nav a {
        margin: 0 10px;
      }

      .essay-page {
        width: min(100% - 2.5rem, 760px);
        padding-top: 4rem;
      }
    }
  </style>
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
</body>
</html>
